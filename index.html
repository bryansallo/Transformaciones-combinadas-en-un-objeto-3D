<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Transformaciones 3D</title>
<style>
body { margin: 0; overflow: hidden; font-family: Arial; }

#info {
position: absolute;
top: 10px;
left: 10px;
background: rgba(255,255,255,0.8);
padding: 10px;
border-radius: 8px;
}
</style>
</head>
<body>

<div id="info">
<b>CONTROLES</b><br>
Flechas: mover<br>
Q/E: rotar<br>
Z/X: escalar
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// Escena
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x20232a);

// Cámara
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

// Render
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// GEOMETRÍA
const geometry = new THREE.BoxGeometry(1,1,1);

// 🎨 COLORES TIPO "LIMÓN" (variaciones verde/amarillo)
const materiales = [
    new THREE.MeshStandardMaterial({ color: 0x9b59b6 }), // verde limón claro
    new THREE.MeshStandardMaterial({ color: 0xf1c40f }), // lima
    new THREE.MeshStandardMaterial({ color: 0xe74c3c }), // amarillo verdoso
    new THREE.MeshStandardMaterial({ color: 0x3498db }), // lima intenso
    new THREE.MeshStandardMaterial({ color: 0x00ffcc }), // amarillo limón
    new THREE.MeshStandardMaterial({ color: 0xc8ff00 })  // verde ácido
];

// CREAR CUBO
const cubo = new THREE.Mesh(geometry, materiales);
scene.add(cubo);
// BORDES DEL CUBO
const edges = new THREE.EdgesGeometry(geometry);

// 🎯 COLOR QUE CONTRASTA (elige uno)
const lineMaterial = new THREE.LineBasicMaterial({
    color: 0xff00ff });

const lineas = new THREE.LineSegments(edges, lineMaterial);
cubo.add(lineas);

// Luces
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

// Controles teclado
window.addEventListener('keydown', (e) => {

    // TRASLACIÓN
    if (e.key === "ArrowUp") cubo.position.y += 0.1;
    if (e.key === "ArrowDown") cubo.position.y -= 0.1;
    if (e.key === "ArrowLeft") cubo.position.x -= 0.1;
    if (e.key === "ArrowRight") cubo.position.x += 0.1;

    // ROTACIÓN
    if (e.key === "q" || e.key === "Q") cubo.rotation.y -= 0.1;
    if (e.key === "e" || e.key === "E") cubo.rotation.y += 0.1;

    // ESCALADO
    if (e.key === "z" || e.key === "Z") {
        cubo.scale.x += 0.1;
        cubo.scale.y += 0.1;
        cubo.scale.z += 0.1;
    }

    if (e.key === "x" || e.key === "X") {
        cubo.scale.x = Math.max(0.2, cubo.scale.x - 0.1);
        cubo.scale.y = Math.max(0.2, cubo.scale.y - 0.1);
        cubo.scale.z = Math.max(0.2, cubo.scale.z - 0.1);
    }
});

// Animación
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

animate();

// Responsivo
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
