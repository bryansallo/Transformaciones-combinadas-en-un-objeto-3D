<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Transformaciones 3D</title>

<style>
body { margin: 0; overflow: hidden; font-family: Arial; }

#info {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(255,255,255,0.8);
    padding: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div id="info">
<b>CONTROLES</b><br>
Flechas: mover<br>
Q/E: rotar<br>
Z/X: escalar
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// ESCENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x20232a);

// CÁMARA
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);
camera.position.z = 5;

// RENDER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// GEOMETRÍA
const geometry = new THREE.BoxGeometry(1,1,1);

// 🎨 COLORES
const materiales = [
    new THREE.MeshStandardMaterial({ color: 0x9b59b6 }),
    new THREE.MeshStandardMaterial({ color: 0xf1c40f }),
    new THREE.MeshStandardMaterial({ color: 0xe74c3c }),
    new THREE.MeshStandardMaterial({ color: 0x3498db }),
    new THREE.MeshStandardMaterial({ color: 0x00ffcc }),
    new THREE.MeshStandardMaterial({ color: 0xc8ff00 })
];

// CUBO
const cubo = new THREE.Mesh(geometry, materiales);
scene.add(cubo);

// BORDES
const edges = new THREE.EdgesGeometry(geometry);
const lineMaterial = new THREE.LineBasicMaterial({ color: 0xff00ff });
const lineas = new THREE.LineSegments(edges, lineMaterial);
cubo.add(lineas);

// LUCES
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

// 🔥 FUNCIÓN PARA LIMITES DE CÁMARA
function obtenerLimites() {
    const distancia = camera.position.z;

    const vFOV = THREE.MathUtils.degToRad(camera.fov);
    const altura = 2 * Math.tan(vFOV / 2) * distancia;
    const ancho = altura * camera.aspect;

    return {
        xMin: -ancho / 2,
        xMax: ancho / 2,
        yMin: -altura / 2,
        yMax: altura / 2
    };
}

// CONTROLES
window.addEventListener('keydown', (e) => {

    const limites = obtenerLimites();
    const paso = 0.1;

    // MOVIMIENTO CON LIMITES
    if (e.key === "ArrowUp") {
        if (cubo.position.y + paso < limites.yMax - cubo.scale.y/2)
            cubo.position.y += paso;
    }

    if (e.key === "ArrowDown") {
        if (cubo.position.y - paso > limites.yMin + cubo.scale.y/2)
            cubo.position.y -= paso;
    }

    if (e.key === "ArrowLeft") {
        if (cubo.position.x - paso > limites.xMin + cubo.scale.x/2)
            cubo.position.x -= paso;
    }

    if (e.key === "ArrowRight") {
        if (cubo.position.x + paso < limites.xMax - cubo.scale.x/2)
            cubo.position.x += paso;
    }

    // ROTACIÓN
    if (e.key === "q" || e.key === "Q") cubo.rotation.y -= 0.1;
    if (e.key === "e" || e.key === "E") cubo.rotation.y += 0.1;

    // ESCALADO CON LÍMITES
    if (e.key === "z" || e.key === "Z") {
        if (cubo.scale.x < 2) {
            cubo.scale.x += 0.1;
            cubo.scale.y += 0.1;
            cubo.scale.z += 0.1;
        }
    }

    if (e.key === "x" || e.key === "X") {
        cubo.scale.x = Math.max(0.2, cubo.scale.x - 0.1);
        cubo.scale.y = Math.max(0.2, cubo.scale.y - 0.1);
        cubo.scale.z = Math.max(0.2, cubo.scale.z - 0.1);
    }
});

// ANIMACIÓN
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

animate();

// RESPONSIVE
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
